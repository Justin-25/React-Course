<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script type="text/babel">

      function ChatInput({ 
        chatMessages, 
        setChatMessages 
      }) {
        // current data, Updater Function.
        const [inputText, setInputText] = React.useState('');

        function saveInputText(event) {
          setInputText(event.target.value)
        }
        
        function sendMessage() {
          const newChatMessages = [
            ...chatMessages,
            {
              id: crypto.randomUUID(),
              message: inputText,
              sender: 'user'
            }
          ];

          setChatMessages(newChatMessages);

          const response = Chatbot.getResponse(inputText);
          setChatMessages([
            ...newChatMessages,
            {
              id: crypto.randomUUID(),
              message: response,
              sender: 'robot'
            }
          ]);

          setInputText('');
        }

        // return some html
        return (
          // JSX is more strict than normal HTML.
          // All elements need a closing tag
          // Normal way
          // <input></input>
          // Shorcut <input /> if there's nothing inside the element

          // div is to group elements to have a multiple elements
          <>
            <input 
              placeholder="Send a message to Chatbot" 
              size="30"
              onChange={saveInputText}
              value={inputText} // Controlled Input
            />
            <button
              onClick={sendMessage}
            >
            Send</button>
          </>
        );
      }

      function ChatMessage({ message, sender }) {
        // const message = props.message;
        // const sender = props.sender;
        // const { message, sender } = props;

        // if(sender === 'robot') {
        //   return (
        //     <div>
        //       <img src="robot.png" width="50" />
        //       {message}
        //     </div>
        //   )
        // };

        return (
            <div>
              {sender === 'robot' && (
                <img src="robot.png" width="50" />
              )}
              {message}
              {sender === 'user' && (
                <img src="user.png" width="50" />
              )}
            </div>
        )
      };

      function ChatMessages({ chatMessages }) {
        // Array Destructuring
        // const [chatMessages, setChatMessages] = array;

        // Current data
        // const chatMessages = array[0];
        // Updater Function
        // const setChatMessages = array[1];

        return (
          <>
            {chatMessages.map((chatMessages) => {
              return (
                <ChatMessage 
                  message = {chatMessages.message}
                  sender = {chatMessages.sender}
                  key = {chatMessages.id}
                />
              );
            })}
          </>
        );
      };

      function App() {
        // Array Destructuring
        const [chatMessages, setChatMessages] = React.useState([{
          id: 'id1',
          message: 'Hello Chatbot',
          sender: 'user'
        },
        {
          id: 'id2',
          message: 'Hello! How can I help you?',
          sender: 'robot'
        }]);

        return (
            <>
              <ChatInput 
                chatMessages = {chatMessages}
                setChatMessages = {setChatMessages}
              /> 
              <ChatMessages 
                chatMessages = {chatMessages}
              />
            </>
          );
      }
      
      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
        root.render(<App />)
    </script>
