<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script type="text/babel">

      function ChatInput() {
        // return some html
        return (
          // JSX is more strict than normal HTML.
          // All elements need a closing tag
          // Normal way
          // <input></input>
          // Shorcut <input /> if there's nothing inside the element

          // div is to group elements to have a multiple elements
          <>
            <input placeholder="Send a message to Chatbot" size="30" />
            <button>Send</button>
          </>
        );
      }

      const app = (
        <div>
          <ChatInput /> 
        </div>
      );
      
      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
        root.render(app)
    </script>
  </body>
</html>
