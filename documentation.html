<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documention of React</title>
</head>
<body>
  <!-- 
    What is React?
    React = external library that helps us create websites easier
      1. React is an external library
      2. React helps us create websites easier

    External Library
      = code that is outside our computer
      = code that someone else wrote

    React is an external library
      - It's a bunch of code that is outside our computer.
      - We can laod this code on our website, and use it.

    React can be used in different places
      Websites
      Mobile Apps
    1. React = shared features
    2. features specific to websites

    Using React to create websites
      = load React & ReactDOM

    Using React to create mobile apps
      = load React & ReactNative

    ReactDOM.createRoot() = sets up React
      One of the feature of React
      render = display something

    What is Babel?
      Babel = JavaScript compiler
        = translate other languages into JavaScript

    When using React, we don't use normal JavaScript
    We use an enhanced version of JavaScript = JSX

    JSX = JavaScript XML
      = same as JavaScript, but we can write HTML directly in out JavaScript code
    When using React, we use JSX instead of normal JavaScript

    Problem with JSX;
      - Our web browser doesn't understand JSX
      - Need to translate JSX into JavaScript
    
    Babel = translate JSX into JavaScript

    Benefits of using React
    1. Creating a website with React feels natural
    2. JSX lets us find errors easier
    3. We can insert values inside JSX elements

    Components and Props
    Components = a piece of the website

    When building websites:
      - it's better to split up the websites into pieces.
      - so we can work on a small piece of the website at a time

    In React
      - The component name must start with a capital letter.  
    PascalCase = each word starts with a capital letter; ChatInput

    JSX is more strict than normal HTML.
    All elements need a closing tag

    Main idea of React
      - We can create our own HTML elements

    Fragments(<></>)
      - group elements together, without creating an extra <div>
        
    Components are designed to be reusable
    Props = properties
      - make our components reusable

    If-Statememnt Directly Inside JSX
    Guard Operator (&&)
      const result = value1 && value2;
      - If value1 is true, the result will be value2
      - This works just like an if-statement

    () = allow bracket to put multiple line
    {sender === 'robot' && (
                <img src="robot.png" width="50" />
              )}

    Use a component to create the app
    Best Practice
      - Use a component (App) to create the website

    Use JavaScript to generate these components
      1 Save the data
        data = information
      2 Generate the HTML
      3. Make it ineractive

    key = helps React track changes in the array
    key = has to be unique

    Event Handlers
      - run a function when we interact with the websites

    State 
      = data that is connected to the HTML
      = We should use state to save data that changes over time
        - When we update the data, it will update the HTML
        - To convert the data into state, we use React.useState()
        1. The current data
        2. Function that updates the data

    In React
      - we should not update the data directly
      - we should not modify the data directly
      - We should always create a copy and then modify the copy
      - This helps React be more efficient

    JS feature
      - Spread Operator(...)
        = takes the value in an array, and copies them into a new array

    Array Destructuring
      - Order Matters

    React Best Practice
      - Do not use the DOM manually
        (React is managing the website)
      - We should use React features to get the text from a textbox

    onClick = run a function when we click
    onChange = runs a function when we change the text inside an <input>
    event.target = gives us the element that we're typing in.
    value = change the text inside this <input>

    Lifting the State Up
      - share state between multiple components
    
    State does not update immediately
    State is updated after all of the code is finished

    In React, we used className
      - React is JavaScript code
      - JavaScript already has a feature called class
      - class is a reserved word

    Ternary Operator (?:)
      value1 ? value2 : value3
      - Works like an if-else statement
      - if value1 is true -> value2 else value3
    Ternary operator = insert an if-else statement direclty in the JSX

    {} - save the result of the code into the prop
    Hooks - insert React features into our component
      - React.useState() is a hook
        = const [state, setState] = React.useState('');
    State - automatically updates the HTML when the data changes
    
    React Hooks
      - useState()
      - useEffect()
        - run some code after the components is created or updated
      - useRef()
        - automatically save an HTML element from the component
          ref = container with special React features
    - Every hook starts with the word "use" 
    - Put hooks at the top of the components
    - Hooks should not be inside anything
        - don't put a hook inside an if-statement or inside function.
      
      React.useEffect(() => {
          
      }, [Controls when useEffect runs])
        - React will run this function
          - after component is created
          - every time the component is updated
      [] = only run once, after the component is created
      [chatMessages] = Dependency Array (control when useEffect runs)

      Best Practice
        - Give useEffect a dependency array to avoid running too often
  -->

</html>
