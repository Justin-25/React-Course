<!DOCTYPE html>
<html>
  <head>
    <title>Challenge 1</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script type="text/babel">

      function ProductDetails({
        product,
        imageSrc,
        title,
        price,
        discountPrice
      }) {

        if(product === 'cotton') {

          const result = !discountPrice ? (
            <div>
              <img src={imageSrc} />
              <p>{title}</p>
              <p>Price: ${price}</p>
              <button>Add to Cart</button>
            </div>
          ) : (
            <div>
              <img src={imageSrc} />
              <p>{title}</p>
              <p><del>Price: ${price}</del></p>
              <p>Discount price: ${discountPrice}</p>
              <button>Add to Cart</button>
            </div>
          )

          return result;

          // if(!discountPrice) {
          //   return (
          //     <>
          //       <p>{title}</p>
          //       <p>Price: ${price}</p>
          //       <button>Add to Cart</button>
          //     </>
          //   )
          // } else {
          //   return (
          //     <>
          //       <p>{title}</p>
          //       <p><del>Price: ${price}</del></p>
          //       <p>Discount price: ${discountPrice}</p>
          //       <button>Add to Cart</button>
          //     </>
          //   )
          // };

        } else if (product === 'tennis') {
          return (
            <div>
              <img src={imageSrc} />
              <p>{title}</p>
              <p>Price: ${price}</p>
              <button>Add to Cart</button>
            </div>
          );

        } else if (product === 'tshirt') {
          return (
            <div>
              <img src={imageSrc} />
              <p>{title}</p>
              <p>Price: ${price}</p>
              <button>Add to Cart</button>
            </div>
          )
        };
      }

      function App() {
        return(
          <>
            <ProductDetails
              imageSrc="cotton-socks.png"
              product="cotton"
              title="Cotton socks" 
              price="10.90"
              discountPrice="5.45"
            />
            <ProductDetails
              imageSrc="tennis-balls.png"
              product="tennis"
              title="Tennis balls" 
              price="6.00"
            />
            <ProductDetails
              imageSrc="plain-t-shirt.png"
              product="tshirt"
              title="T-Shirt" 
              price="7.99"
            />
          </>
        )
      }
      
      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
        root.render(<App />)
    </script>
  </body>
</html>
